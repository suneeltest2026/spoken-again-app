<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Speak Again — Fluency Practice</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="app">

  <!-- SCREEN 1: choose track -->
  <section id="screen-tracks" class="screen active">
    <header class="app-header">
      <h1>Speak Again</h1>
      <p class="subtitle">Practice speaking English out loud with Claude</p>
    </header>
    <div id="track-list" class="card-list"></div>
  </section>

  <!-- SCREEN 2: choose scenario -->
  <section id="screen-scenarios" class="screen">
    <header class="app-header">
      <button class="back-btn" data-back="screen-tracks">&larr;</button>
      <h1 id="track-title">Track</h1>
      <p class="subtitle" id="track-desc"></p>
    </header>
    <div id="scenario-list" class="card-list"></div>
  </section>

  <!-- SCREEN 3: conversation -->
  <section id="screen-chat" class="screen">
    <header class="app-header chat-header">
      <button class="back-btn" data-back="screen-scenarios">&larr;</button>
      <div>
        <h1 id="chat-title">Scenario</h1>
        <p class="subtitle" id="chat-level"></p>
      </div>
    </header>

    <div id="chat-log" class="chat-log"></div>

    <div id="feedback-card" class="feedback-card hidden">
      <div class="feedback-label">Coaching tip</div>
      <div id="feedback-corrected" class="feedback-corrected"></div>
      <div id="feedback-tip" class="feedback-tip"></div>
      <button id="retry-btn" class="retry-btn hidden">Repeat this sentence out loud</button>
    </div>

    <div class="input-bar">
      <button id="mic-btn" class="mic-btn" title="Tap to speak">🎙️</button>
      <input id="text-input" type="text" placeholder="Or type your answer here..." />
      <button id="send-btn" class="send-btn">Send</button>
    </div>
    <div id="mic-status" class="mic-status"></div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
